version: '3.8'

services:
  # 1. The Local Model Garden Engine (Zero-Cost Inference)
  ollama:
    image: ollama/ollama:latest
    container_name: vanguard_ollama
    volumes:
      - ./ollama/data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_KEEP_ALIVE=24h

  # 2. The Auto-Orchestrator (Webhook queue handling & automation)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: vanguard_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.loonyheads.local
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=vanguard
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - EXECUTIONS_MODE=queue  # For high-speed queue processing
    depends_on:
      - postgres
      - redis
    volumes:
      - ./n8n/data:/home/node/.n8n

  # 3. Queue Manager (Required for n8n queue mode)
  redis:
    image: redis:alpine
    container_name: vanguard_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data

  # 4. Multi-Tenant Database
  postgres:
    image: postgres:15-alpine
    container_name: vanguard_postgres
    environment:
      - POSTGRES_USER=vanguard
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=vanguard_saas
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

  # 5. PII Scrubber Middleware & Router
  pii_scrubber:
    build:
      context: ./docker/middleware
      dockerfile: Dockerfile
    container_name: vanguard_pii_scrubber
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
